# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  - master

pr:
  autoCancel: "true"

pool:
  vmImage: "windows-latest"

steps:
  - checkout: self
    submodules: false
    displayName: "Checkout repository"
  - script: |
      git submodule sync
      git submodule update --init --force themes/hugo-admonitions
    displayName: "Initialize theme submodule"

  - task: PowerShell@2
    name: ResourcesJSON
    displayName: "Generating Resources JSON from PSGallery"
    inputs:
      filePath: "./Get-DscResourceKitInfo.ps1"
      pwsh: true
      errorActionPreference: continue

  # - task: giuliovdev.hugo-extension.hugo-build-task-v2.HugoTask@2
  #   displayName: "Generate Hugo site"
  #   inputs:
  #     destination: "$(Build.ArtifactStagingDirectory)"
  #     hugoVersion: 0.135.0

  - pwsh: |
      $ErrorActionPreference = 'Stop'
      $versionsConfig = Get-Content -Path ".\.versions.json" -Raw | ConvertFrom-Json
      $hugoVersion = $versionsConfig.hugo.version
      $hugoUrl = "https://github.com/gohugoio/hugo/releases/download/v$hugoVersion/hugo_extended_${hugoVersion}_windows-amd64.zip"
      $outputPath = ".\hugo.zip"
      Write-Host "Configured Hugo version: $hugoVersion"
      Write-Host "Downloading Hugo from: $hugoUrl"
      Invoke-WebRequest -Uri $hugoUrl -OutFile $outputPath
      Expand-Archive -Path $outputPath -DestinationPath ".\hugo"
      Write-Host "Downloaded Hugo executable:"
      Get-ChildItem -Path ".\hugo" -Filter "hugo.exe" | Format-List -Property FullName,Length,LastWriteTime
      .\hugo\hugo.exe version
    displayName: "Download and Extract Hugo"

  - pwsh: |
      $ErrorActionPreference = 'Stop'
      Write-Host "System.DefaultWorkingDirectory: $(System.DefaultWorkingDirectory)"
      Write-Host "Build.ArtifactStagingDirectory: $(Build.ArtifactStagingDirectory)"
      $hasGitHubToken = -not [string]::IsNullOrWhiteSpace($env:HUGO_GITHUB_TOKEN)
      Write-Host "HUGO_GITHUB_TOKEN provided: $hasGitHubToken"
      .\hugo\hugo.exe version
      .\hugo\hugo.exe --source "$(System.DefaultWorkingDirectory)" --destination "$(Build.ArtifactStagingDirectory)" --printI18nWarnings --printPathWarnings --debug --logLevel debug
    displayName: "Build Hugo Site"
    env:
      HUGO_GITHUB_TOKEN: $(GITHUB_TOKEN)

  - task: PublishPipelineArtifact@0
    displayName: "Publish Hugo site as artifact"
    inputs:
      artifactName: "dsccommunity"
      targetPath: "$(Build.ArtifactStagingDirectory)"
